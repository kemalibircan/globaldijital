# GlobalDijital - Nginx reverse proxy
# Domain: YOUR_DOMAIN.com (Namecheap + Cloudflare SSL)
# Sunucu IP: 141.11.109.224
#
# Kurulum: Bu dosyayı kopyalayıp YOUR_DOMAIN.com yerine kendi domain'inizi yazın.
# Sonra: sudo cp nginx/globaldijital.conf /etc/nginx/sites-available/
#        sudo ln -s /etc/nginx/sites-available/globaldijital.conf /etc/nginx/sites-enabled/
#        sudo nginx -t && sudo systemctl reload nginx

# HTTP -> HTTPS yönlendirme (Cloudflare veya Nginx SSL kullanıyorsanız)
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # Cloudflare gerçek IP (log'larda doğru IP görünsün)
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # HTTPS'e yönlendir (Cloudflare "Flexible" veya "Full" SSL kullanıyorsanız)
    return 301 https://$server_name$request_uri;
}

# HTTPS (Cloudflare Full SSL: Cloudflare -> Nginx 80 veya 443)
# Cloudflare "Flexible" kullanıyorsanız sadece 80 dinleyin; yukarıdaki return 301'ı kaldırıp bu server bloğunda listen 80 yapın.
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # Cloudflare gerçek IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # SSL: Cloudflare Origin Certificate kullanıyorsanız (Full Strict için)
    # Önce Cloudflare Dashboard -> SSL/TLS -> Origin Server -> Create Certificate
    # Oluşan .pem dosyalarını sunucuya atıp aşağıdaki yolları güncelleyin.
    # ssl_certificate     /etc/nginx/ssl/cloudflare-origin.pem;
    # ssl_certificate_key /etc/nginx/ssl/cloudflare-origin-key.pem;

    # Cloudflare Flexible kullanıyorsanız Nginx'te SSL olmayabilir; o zaman bu server bloğunu kapatıp sadece 80 kullanın.
    # Örnek: listen 80; ile tek server bloğu (aşağıdaki location'lar aynı kalır).

    # API istekleri -> Backend (Node, port 5000)
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Health check (opsiyonel, doğrudan backend'e)
    location /health {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Geri kalan her şey -> Frontend (Next.js, port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
